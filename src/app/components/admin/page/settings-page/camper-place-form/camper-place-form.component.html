  @if (camperPlaces) {

    <form [formGroup]="camperPlaceForm" class="cpForm">
      <div class="tableContainer">
        <table mat-table [dataSource]="rows.controls" formArrayName="rows">
          <ng-container matColumnDef="index">
            <th mat-header-cell *matHeaderCellDef> Indeks </th>
            <td mat-cell *matCellDef="let row; let i = index"
                [formGroupName]="i">
              <mat-form-field appearance="outline" class="field">
                <input matInput formControlName="index">
              </mat-form-field>
            </td>
          </ng-container>

          <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef> Rodzaj </th>
            <td mat-cell *matCellDef="let row; let i = index"
                [formGroupName]="i">
              <mat-form-field appearance="outline" class="select field">
                <mat-select formControlName="type" [compareWith]="compareTypes">
                  @if (camperPlaceTypes) {
                    @for (cpType of camperPlaceTypes; track cpType.id) {
                      <mat-option [value]="cpType">{{cpType.typeName}}</mat-option>
                    }
                  }
                </mat-select>
              </mat-form-field>
            </td>
          </ng-container>

          <ng-container matColumnDef="price">
            <th mat-header-cell *matHeaderCellDef> Cena </th>
            <td mat-cell *matCellDef="let row; let i = index"
                [formGroupName]="i">
              <mat-form-field appearance="outline" class="field">
                <input matInput type="number" formControlName="price">
              </mat-form-field>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true" class="primary"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
    </form>
    @if(formChanged) {
      <footer class="buttons">
        <app-form-buttons
          [firstButtonText]="'Reset'"
          [secondButtonText]="'Zapisz'"
          [firstAction]="reset"
          [secondAction]="update">
        </app-form-buttons>
      </footer>
    }
  }
