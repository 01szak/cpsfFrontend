<div class="table-header">
  <h3>{{title}}</h3>
  <div class="header-actions">
    @if (showGraph) {
      <i (click)="toggleGraphMode()" 
         class="change-button fa-solid" 
         [ngClass]="graphMode === 'revenue' ? 'fa-hashtag' : 'fa-dollar-sign'"
         style="margin-right: 12px; cursor: pointer;"
         [title]="graphMode === 'revenue' ? 'Pokaż ilość rezerwacji' : 'Pokaż obrót'">
      </i>
    }
    <i (click)="toggleView()" 
       class="change-button fa-solid" 
       [ngClass]="showGraph ? 'fa-table' : 'fa-chart-column'"
       style="cursor: pointer;">
    </i>
  </div>
</div>

<mat-card class="container-card">
  <div class="content-wrapper">
    <div class="table primary" [style.display]="showGraph ? 'none' : 'block'">
      <table mat-table [dataSource]="displayData || []">

        <ng-container matColumnDef="camperPlaceNumber">
          <th mat-header-cell *matHeaderCellDef> Nr. parceli</th>
          <td mat-cell *matCellDef="let displayData"> {{ displayData.camperPlaceNumber }}</td>
          <td mat-footer-cell *matFooterCellDef>Suma:</td>
        </ng-container>

        <ng-container matColumnDef="reservationCount">
          <th mat-header-cell *matHeaderCellDef> Ilość rezerwacji</th>
          <td mat-cell *matCellDef="let displayData"> {{ displayData.reservationCount }}</td>
          <td mat-footer-cell *matFooterCellDef>{{ countResCount() }}</td>
        </ng-container>

        <ng-container matColumnDef="revenue">
          <th mat-header-cell *matHeaderCellDef> Obrót </th>
          <td mat-cell *matCellDef="let displayData"> {{ displayData.revenue }} zł</td>
          <td mat-footer-cell *matFooterCellDef>{{ countRevenue() }} zł</td>
        </ng-container>

        <tr mat-header-row class="header" *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row  *matRowDef="let row; let i = index; columns: displayedColumns;"
            [ngClass]="{
            'quaternary': i % 2 !== 0,
             }"></tr>
        <tr mat-row class="footer" *matFooterRowDef="displayedColumns;"></tr>
      </table>
    </div>

    <div class="graph-wrapper" [style.display]="showGraph ? 'flex' : 'none'">
      <app-graph
        [results]="getGraphData()"
        [xAxisLabel]="'Parcele'"
        [yAxisLabel]="graphMode === 'revenue' ? 'Obrót (zł)' : 'Ilość rezerwacji'">
      </app-graph>
    </div>
  </div>
</mat-card>
